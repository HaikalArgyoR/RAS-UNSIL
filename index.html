<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAS-IoT - Modern 3D Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- MQTT Status Indicator -->
    <div class="mqtt-status">
        <span class="status-indicator status-disconnected" id="mqtt-status-indicator"></span>
        <span id="mqtt-status-text">MQTT: Disconnected</span>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <img src="logo_ikan.png" alt="AquaDrum" class="h-16 w-16 object-contain aspect-square" />
            </div>
            <div class="logo-text">SISTEM MONITORING AIR KOLAM RAS (Recirculating Aquaculture System)</div>
        </div>
    </header>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <a href="#dashboard" class="menu-item">
            <div class="menu-icon"><i class="fas fa-home"></i></div>
            <div class="menu-text">Dashboard</div>
        </a>
        <a href="#kolam1" class="menu-item">
            <div class="menu-icon"><i class="fas fa-water"></i></div>
            <div class="menu-text">Kolam 1</div>
        </a>
        <a href="#kolam2" class="menu-item">
            <div class="menu-icon"><i class="fas fa-water"></i></div>
            <div class="menu-text">Kolam 2</div>
        </a>
    </nav>

    <!-- Mobile Sidebar Toggle -->
    <div class="mobile-menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <section id="dashboard" class="mb-10">
            <div class="relative mb-10 rounded-2xl overflow-hidden" style="height: 280px; background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(16, 185, 129, 0.1) 100%); border: 1px solid rgba(6, 182, 212, 0.2);">
                <canvas id="aquariumCanvas" class="w-full h-full block"></canvas>
                <div class="absolute inset-0 flex flex-col justify-center items-center text-white pointer-events-none" style="background: linear-gradient(180deg, rgba(10, 14, 39, 0) 0%, rgba(10, 14, 39, 0.3) 100%);">
                    <h1 class="text-4xl md:text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-green-300 animate-pulse">RAS-IoT Dashboard</h1>
                    <p class="text-lg md:text-xl text-cyan-200 font-semibold">Monitoring Kualitas Air Kolam RAS</p>
                </div>
            </div>
            <h2 class="section-title mb-8 mt-12">
                <i class="fas fa-tachometer-alt"></i>
                <span>Status Kolam Realtime</span>
            </h2>
            <div class="add-remove-buttons">
                <button id="add-kolam" class="btn btn-primary" onclick="addKolam()">
                    <i class="fas fa-plus"></i>Tambah Kolam
                </button>
                <button id="remove-kolam" class="btn btn-danger" onclick="removeKolam()">
                    <i class="fas fa-minus"></i>Hapus Kolam
                </button>
            </div>
            <div class="kolam-container" id="kolam-container"></div>
        </section>
    </main>

    <!-- MQTT Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.6.1/mqtt.min.js"></script>

    <!-- Custom JS Files (ordered by dependency) -->
    <script src="js/config.js"></script>
    <script src="js/aquarium.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/mqtt.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
